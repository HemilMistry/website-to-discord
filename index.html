<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website to Discord</title>
</head>
<body>

<!-- HTML form -->
<form id="myForm" action="/submitData" method="POST">
    <label for="textbox">Enter your text:</label>
    <input type="text" id="textbox" name="inputData" required>
    <button type="submit">Submit</button>
</form>

 <!-- JavaScript -->
<script>
    document.getElementById("myForm").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevent the default form submission
        
        var inputData = document.getElementById('textbox').value; 
        var xhr = new XMLHttpRequest(); 
        xhr.open("POST", "/submitData");
        xhr.setRequestHeader("Content-Type","application/json");
        xhr.onload = function() {
            if (xhr.status === 200) {
                console.log('Data submitted successfully', xhr.responseText);
            } else {
                console.log('Error submitting data', xhr.statusText);
            }
        };
        xhr.send(JSON.stringify({inputData: inputData}));
    });
</script>

</body>
</html>
