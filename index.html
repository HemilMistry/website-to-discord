<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website to Discord</title>
</head>
<body>

<!-- HTML form -->
<form id="myForm" action="" method="POST">
    <label for="textbox">Enter your text:</label>
    <input type="text" id="textbox" name="inputData" required>
    <button type="submit">Submit</button>
</form>

 <!-- JavaScript -->
<script>
document.getElementById("myForm").addEventListener("submit", function(event) {
    event.preventDefault(); // Prevent the default form submission
    
    var inputData = document.getElementById('textbox').value; 
    var xhr = new XMLHttpRequest(); 
    var url = 'https://website-to-discord.vercel.app/submitData'; // Update the URL here
    xhr.open("POST", url);
    xhr.setRequestHeader("Content-Type","application/json");
    xhr.onload = function() {
        if (xhr.status === 200) {
            console.log('Data submitted successfully', xhr.responseText);
        } else {
            console.log('Error submitting data', xhr.statusText);
        }
    };
    xhr.send(JSON.stringify({inputData: inputData}));
});

// Update the form action URL dynamically
document.getElementById("myForm").action = 'https://website-to-discord.vercel.app/submitData';
</script>

</body>
</html>
