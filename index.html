<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website to Discord</title>
</head>
<body>


<!-- HTML form -->
<form action="/submitData" method="POST">
    <label for="textbox">Enter your text:</label>
    <input type="text" id="textbox" name="inputData">
    <button type="button" id="submitBtn">Submit</button>
</form>

 <!-- JavaScript -->
<script>
    document.getElementById("submitBtn").addEventListener("click", sendValue);
    
    function sendValue() {
        var inputData = document.getElementById('textbox').value; // Corrected: Changed 'textInput' to 'textbox'
        var xhr = new XMLHttpRequest(); // Corrected: Instantiate a new XMLHttpRequest object
        xhr.open("POST", "/submitData");
        xhr.setRequestHeader("Content-Type","application/json");
        xhr.onload = function() {
            if (xhr.status === 200) {
                console.log('Data submitted successfully', xhr.responseText);
            } else {
                console.log('Error submitting data', xhr.statusText);
            }
        };
        xhr.send(JSON.stringify({inputData: inputData}));
    }
    </script>

</body>
</html>
